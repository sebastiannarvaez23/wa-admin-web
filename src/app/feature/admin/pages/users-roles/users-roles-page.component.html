<span class="text">
    <i class="bx bx-group"></i>
    {{ 'admin.users-roles.title' | translate }}
</span>

<div class="page-layout">

    <div class="settings-tabs">
        <button *ngFor="let tab of tabs" class="tab-btn" [class.active]="activeTab === tab.key"
            (click)="setTab(tab.key)">
            <i class="bx" [ngClass]="tab.icon"></i>
            {{ tab.label | translate }}
        </button>
    </div>

    <div class="page-content">
        <wa-admin-users          *ngIf="activeTab === 'users'"></wa-admin-users>
        <wa-permissions-manager  *ngIf="activeTab === 'permissions'"
                                 [dataSource]="permissionsDataSource">
        </wa-permissions-manager>
    </div>

</div>
